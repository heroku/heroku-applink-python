name: Release

on:
  push:
    tags:
      - 'v*'  # Push events to matching v*, i.e. v1.0, v20.15.10
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0 or 1.0.0-rc.1)'
        required: true
        type: string
      is_prerelease:
        description: 'Is this a pre-release?'
        required: true
        type: boolean
        default: false

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: tox

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            VERSION=$(git describe --tags --abbrev=0)
            echo "version=${VERSION#v}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ steps.get_version.outputs.version }}
          body: |
            Automated release for version ${{ steps.get_version.outputs.version }}
            
            ## Changelog
            $(cat CHANGELOG.md)
          prerelease: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.is_prerelease || contains(github.ref, 'rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Documentation
        run: |
          # Update version in docs
          sed -i "s/version = .*/version = '${{ steps.get_version.outputs.version }}'/g" docs/conf.py
          # Build docs
          cd docs && make html

      - name: Deploy to Staging
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.is_prerelease || contains(github.ref, 'rc') }}
        run: |
          # Add staging deployment steps here
          echo "Deploying to staging..."

      - name: Deploy to Production
        if: ${{ github.event_name == 'workflow_dispatch' && !github.event.inputs.is_prerelease || !contains(github.ref, 'rc') }}
        run: |
          # Add production deployment steps here
          echo "Deploying to production..."

      - name: Notify Team
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,action,eventName,ref,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
