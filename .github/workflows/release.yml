name: Release
# Test workflow for development branch

on:
  workflow_call:
    inputs:
      python-version:
        required: true
        type: string
      os:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      python-version:
        description: 'Python version to release with'
        required: true
        type: string
        default: '3.10'
      os:
        description: 'OS to release on'
        required: true
        type: string
        default: 'ubuntu-latest'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ${{ inputs.os || github.event.inputs.os }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ inputs.python-version || github.event.inputs.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version || github.event.inputs.python-version }}
          
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          
      - name: Install the project
        run: uv sync --all-extras --dev
        
      - name: Release to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Run tests
        run: tox

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            VERSION=$(git describe --tags --abbrev=0)
            echo "version=${VERSION#v}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ steps.get_version.outputs.version }}
          body: |
            Automated release for version ${{ steps.get_version.outputs.version }}
            
            ## Changelog
            $(cat CHANGELOG.md)
          prerelease: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.is_prerelease || contains(github.ref, 'rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Documentation
        run: |
          # Update version in docs
          sed -i "s/version = .*/version = '${{ steps.get_version.outputs.version }}'/g" docs/conf.py
          # Build docs
          cd docs && make html

      - name: Deploy to Staging
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.is_prerelease || contains(github.ref, 'rc') }}
        run: |
          # Add staging deployment steps here
          echo "Deploying to staging..."

      - name: Deploy to Production
        if: ${{ github.event_name == 'workflow_dispatch' && !github.event.inputs.is_prerelease || !contains(github.ref, 'rc') }}
        run: |
          # Add production deployment steps here
          echo "Deploying to production..."

      - name: Notify Team
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,action,eventName,ref,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
