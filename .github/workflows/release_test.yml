name: Release Test

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to test (e.g., 1.0.0 or 1.0.0-rc.1)'
        required: true
        type: string
      is_prerelease:
        description: 'Is this a pre-release?'
        required: true
        type: boolean
        default: false
  push:
    branches: [ bj-add-rollout-doc ]

jobs:
  test:
    name: Test Release Process
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install tox

      - name: Run tests
        run: tox

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            VERSION=$(git describe --tags --abbrev=0)
            echo "version=${VERSION#v}" >> $GITHUB_OUTPUT
          fi

      - name: Test Release Creation (Dry Run)
        run: |
          echo "Would create release: ${{ steps.get_version.outputs.version }}"
          echo "Pre-release status: ${{ github.event.inputs.is_prerelease }}"
          echo "This is a test run - no actual release will be created"

      - name: Test Documentation Update (Dry Run)
        run: |
          echo "Would update docs version to: ${{ steps.get_version.outputs.version }}"
          echo "This is a test run - no actual documentation will be updated"

      - name: Test Deployment (Dry Run)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.is_prerelease }}
        run: |
          echo "Would deploy to staging"
          echo "This is a test run - no actual deployment will occur"

      - name: Test Production Deployment (Dry Run)
        if: ${{ github.event_name == 'workflow_dispatch' && !github.event.inputs.is_prerelease }}
        run: |
          echo "Would deploy to production"
          echo "This is a test run - no actual deployment will occur" 