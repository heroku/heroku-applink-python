name: Release Test

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to test (e.g., 1.0.0 or 1.0.0-rc.1)'
        required: true
        type: string
      is_prerelease:
        description: 'Is this a pre-release?'
        required: true
        type: boolean
        default: false
  push:
    branches: [ bj-add-rollout-doc ]

jobs:
  test:
    name: Run Tests and Linting
    uses: ./.github/workflows/run_tests.yml
    with:
      python-version: '3.10'
      os: 'ubuntu-latest'

  build:
    name: Build Package
    needs: test
    runs-on: pub-hk-ubuntu-24.04-ip
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 
        uses: actions/setup-python@v3
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install the project
        run: uv sync --all-extras --dev
      - name: Build the artifact in dist/
        run: uv build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  release_test:
    name: Test Release Process
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Get version
        id: get_version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            # Check if this is NOT the main branch
            if [[ "${{ github.ref_name }}" != "main" ]]; then
              # For non-main branches, use a test version
              echo "version=0.0.0-test" >> $GITHUB_OUTPUT
            else
              # For main branch, use the actual version from pyproject.toml
              VERSION=$(python -c "import tomli; print(tomli.load(open('pyproject.toml', 'rb'))['project']['version'])")
              echo "version=$VERSION" >> $GITHUB_OUTPUT
            fi
          fi
          echo "Branch: ${{ github.ref_name }}"
          echo "Version: $(cat $GITHUB_OUTPUT)"

      - name: Test Release Creation (Dry Run)
        run: |
          echo "Would create release: ${{ steps.get_version.outputs.version }}"
          echo "Pre-release status: ${{ github.event.inputs.is_prerelease }}"
          echo "This is a test run - no actual release will be created"
          echo "Package files that would be included:"
          ls -la dist/

      - name: Test Package Upload (Dry Run)
        run: |
          echo "Would upload package to PyPI"
          echo "Package files:"
          ls -la dist/
          echo "This is a test run - no actual upload will occur"