name: Release Test

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to test (e.g., 1.0.0 or 1.0.0-rc.1)'
        required: true
        type: string
      is_prerelease:
        description: 'Is this a pre-release?'
        required: true
        type: boolean
        default: false
  push:
    branches: [ bj-add-rollout-doc ]

jobs:
  test:
    name: Test Release Process
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get Python version from pyproject.toml
        id: python_version
        run: |
          pip install tomli
          PYTHON_VERSION=$(python -c "import tomli; print(tomli.load(open('pyproject.toml', 'rb'))['project']['requires-python'].replace('>=', ''))")
          echo "python_version=$PYTHON_VERSION" >> $GITHUB_OUTPUT
          echo "Using Python version: $PYTHON_VERSION"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ steps.python_version.outputs.python_version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install tox

      - name: Run tests
        run: tox

      - name: Get version
        id: get_version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            # Check if this is NOT the main branch
            if [[ "${{ github.ref_name }}" != "main" ]]; then
              # For non-main branches, use a test version
              echo "version=0.0.0-test" >> $GITHUB_OUTPUT
            else
              # For main branch, use the actual version from pyproject.toml
              VERSION=$(python -c "import tomli; print(tomli.load(open('pyproject.toml', 'rb'))['project']['version'])")
              echo "version=$VERSION" >> $GITHUB_OUTPUT
            fi
          fi
          echo "Branch: ${{ github.ref_name }}"
          echo "Version: $(cat $GITHUB_OUTPUT)"

      - name: Test Release Creation (Dry Run)
        run: |
          echo "Would create release: ${{ steps.get_version.outputs.version }}"
          echo "Pre-release status: ${{ github.event.inputs.is_prerelease }}"
          echo "This is a test run - no actual release will be created"

      - name: Test Documentation Update (Dry Run)
        run: |
          echo "Would update docs version to: ${{ steps.get_version.outputs.version }}"
          echo "This is a test run - no actual documentation will be updated"

      - name: Test Deployment (Dry Run)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.is_prerelease }}
        run: |
          echo "Would deploy to staging"
          echo "This is a test run - no actual deployment will occur"

      - name: Test Production Deployment (Dry Run)
        if: ${{ github.event_name == 'workflow_dispatch' && !github.event.inputs.is_prerelease }}
        run: |
          echo "Would deploy to production"
          echo "This is a test run - no actual deployment will occur" 