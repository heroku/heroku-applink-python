name: Create Github Tag and Release

on:
  workflow_run:
    workflows: ["Test, Lint, and Build"]
    types:
      - completed
    branches:
      - bj-manual-release
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number (e.g. 75)'
        required: true
        type: string
      source_branch:
        description: 'Source branch name (e.g. release-v0.2.0)'
        required: true
        type: string

permissions:
  contents: write
  actions: read
  id-token: write

jobs:
  get-source-branch:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'bj-manual-release' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.source_branch.outputs.branch }}
    steps:
      - name: Get PR number from merge commit
        if: github.event_name == 'workflow_run'
        id: pr
        run: |
          PR_NUM=$(echo "${{ github.event.workflow_run.head_commit.message }}" | grep -o '#[0-9]*' | head -n1 | tr -d '#')
          echo "pr=$PR_NUM" >> $GITHUB_OUTPUT

      - name: Get source branch name from PR
        if: github.event_name == 'workflow_run'
        id: source_branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM=${{ steps.pr.outputs.pr }}
          BRANCH=$(gh pr view $PR_NUM --json headRefName --jq .headRefName)
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Set source branch from input
        if: github.event_name == 'workflow_dispatch'
        id: source_branch_input
        run: |
          echo "branch=${{ github.event.inputs.source_branch }}" >> $GITHUB_OUTPUT

  push-git-tag:
    if: startsWith(github.event.inputs.source_branch, 'release-v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          cache-dependency-glob: pyproject.toml

      - name: Build package
        run: |
          uv sync --all-extras
          uv build

      - name: Extract version from branch name
        id: version
        run: |
          VERSION=$(echo "${{ github.event.inputs.source_branch }}" | sed 's/release-v//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "github-actions@github.com"

      - name: Create and push Github tag
        run: |
          echo "Creating tag v${{ steps.version.outputs.version }}"
          git tag -s "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"
          echo "Pushing tag to origin..."
          git push origin "v${{ steps.version.outputs.version }}" 
          echo "Verifying tag was pushed:"
          git ls-remote --tags origin "v${{ steps.version.outputs.version }}"

      - name: Get tag name
        id: get_tag
        run: |
          TAG=$(git describe --tags --abbrev=0)
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Using tag: $TAG"
      
      - name: Create Github Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_tag.outputs.tag }}
          files: |
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: true

      - name: Upload artifacts for publish workflow
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.source_branch }}
          path: dist/
          retention-days: 90
