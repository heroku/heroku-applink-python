name: Test, Lint, and Build

permissions:
  contents: write
  id-token: write

on:
  push:
    branches: [ "main", "bj-manual-release" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number (e.g. 75)'
        required: true
        type: string

jobs:
  test-lint-build:
    name: Test, Lint, and Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
        id: setup-python

      - name: Get Python version from pyproject.toml
        id: pyproject-version
        run: |
          VERSION=$(grep "requires-python" pyproject.toml | sed 's/requires-python = ">=\(.*\)"/\1/')

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          cache-dependency-glob: pyproject.toml

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Install ruff
        run: uv pip install ruff

      - name: Run linting
        run: uv run ruff check .

      - name: Set tox environment name
        id: tox-env
        run: |
          TOX_ENV="py$(echo '${{ matrix.python-version }}' | sed 's/\.//')"
          echo "name=$TOX_ENV" >> $GITHUB_OUTPUT
          echo "Using tox environment: $TOX_ENV"

      - name: Run tests
        run: uv run tox -e ${{ steps.tox-env.outputs.name }} -v

      - name: Build package
        run: uv build

      - name: Get source branch name
        id: source_branch
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH=$(gh pr view ${{ github.event.inputs.pr_number }} --json headRefName --jq .headRefName)
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Upload artifacts for release
        if: ${{ matrix.python-version == steps.pyproject-version.outputs.version && ((github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/bj-manual-release') && contains(github.event.head_commit.message, 'release-v')) || (github.event_name == 'workflow_dispatch' && startsWith(steps.source_branch.outputs.branch, 'release-v'))) }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.ref_name }}
          path: dist/
          retention-days: 90
